name: Node Concorrentes — Social Poll

on:
  schedule:
    - cron: '0 * * * *'    # YouTube: a cada hora
    - cron: '0 */6 * * *'  # Instagram + Twitter: a cada 6 horas
  workflow_dispatch:        # Execução manual para testes (todos os jobs)

jobs:
  youtube-poll:
    name: "📺 YouTube — Canais Concorrentes"
    runs-on: ubuntu-latest
    # Roda em todas as execuções agendadas e manuais
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *' || github.event.schedule == '0 */6 * * *'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r fuja-do-mico-gh/requirements.txt

      - name: Coletar vídeos dos canais concorrentes
        run: python fuja-do-mico-gh/scripts/nodes/concorrentes/youtube_collector.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  instagram-poll:
    name: "📸 Instagram — Concorrentes"
    runs-on: ubuntu-latest
    # Roda apenas no cron de 6h e em execuções manuais
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 */6 * * *'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r fuja-do-mico-gh/requirements.txt

      - name: Coletar posts Instagram dos concorrentes
        run: python fuja-do-mico-gh/scripts/nodes/concorrentes/instagram_collector.py
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  twitter-poll:
    name: "🐦 Twitter/X — Concorrentes"
    runs-on: ubuntu-latest
    # Roda apenas no cron de 6h e em execuções manuais
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 */6 * * *'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r fuja-do-mico-gh/requirements.txt

      - name: Coletar tweets dos concorrentes
        run: python fuja-do-mico-gh/scripts/nodes/concorrentes/twitter_collector.py
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
