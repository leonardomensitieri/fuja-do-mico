name: Node Notícias — RSS Poll Horário

on:
  schedule:
    - cron: '0 * * * *'   # A cada hora, no minuto 0
  workflow_dispatch:       # Permite execução manual para testes

jobs:
  collect-rss:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Coletar feeds RSS e gravar em conteudo_raw
        run: python scripts/02_collect_rss.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
